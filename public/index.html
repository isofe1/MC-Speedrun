<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="TEH3L8yDt8mJY0gfpJlpoqA01zeDQtHnXuUGYabVmjo" />
  <meta name="theme-color" content="#121212">
  <meta name="description" content="View the ultimate Minecraft Speedrun Leaderboard. Track the fastest Any% Glitchless Random Seed (RSG) runs for versions 1.16 through 1.19, including both verified and pending world records.">
  <meta name="keywords" content="Minecraft speedrun, Minecraft leaderboard, MC speedrun 1.16, MC speedrun 1.19, Any% Glitchless, RSG, world record, pending runs, speedrun.com tracker">
  <meta name="author" content="MC Speedrun">
  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://mcspeedrun.bond/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mcspeedrun.bond/">
  <meta property="og:title" content="Minecraft Speedrun Leaderboard (1.16 - 1.19)">
  <meta property="og:description" content="Track the fastest Any% Glitchless Random Seed (RSG) Minecraft runs. Real-time combined leaderboard for verified and pending records.">
  <meta property="og:image" content="https://mcspeedrun.bond/1st.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://mcspeedrun.bond/">
  <meta property="twitter:title" content="Minecraft Speedrun Leaderboard (1.16 - 1.19)">
  <meta property="twitter:description" content="Track the fastest Any% Glitchless Random Seed (RSG) Minecraft runs. Real-time combined leaderboard for verified and pending records.">
  <meta property="twitter:image" content="https://mcspeedrun.bond/logo.png">

  <title>Minecraft Speedrun Leaderboard | 1.16 - 1.19 Any% Glitchless</title>
  
  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00b070" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      MC Speedrun <span class="badge">1.16-1.19</span>
    </div>
    <div class="nav-links">
      <button id="tab-leaderboard" class="tab-btn active" onclick="switchTab('leaderboard')">Leaderboard</button>
      <button id="tab-queue" class="tab-btn" onclick="switchTab('queue')">Queue</button>
    </div>
  </nav>

  <div class="disclaimer-banner">
  Unofficial Speedrun.com tool • Data provided by <a href="https://speedrun.com" target="_blank">speedrun.com API</a>
</div>
  
  <div class="container">
    <div class="header-info">
      <div>
        <h2 id="page-title">Any% Glitchless - Random Seed</h2>
        <p id="page-desc">Combined Leaderboard (Verified & Pending)</p>
      </div>
      <div style="text-align: right;">
        <h2 id="run-count">0 Runs</h2>
        <p id="avg-time">Fetching from server...</p>
        <p id="last-updated" style="font-size: 0.7rem; color: #666; margin-top: 5px;">Updating...</p>
      </div>
    </div>

    <div class="toolbar" id="filter-toolbar">
      <div class="custom-dropdown" id="country-filter-dropdown">
        <button class="dropdown-toggle" id="country-dropdown-btn">
          <span class="dropdown-icon">🌐</span>
          <span class="dropdown-text" id="country-dropdown-text">All Regions</span>
          <span class="dropdown-arrow">⌄</span>
        </button>
        <div class="dropdown-menu" id="country-dropdown-menu">
          <!-- Dynamically populated -->
        </div>
      </div>


      <div class="seed-tabs">
        <button class="seed-tab active" data-value="random">Random Seed</button>
        <button class="seed-tab" data-value="set">Set Seed</button>
      </div>

      <div class="custom-dropdown" id="version-filter-dropdown">

        <button class="dropdown-toggle" id="version-dropdown-btn">
          <span class="dropdown-icon">🎮</span>
          <span class="dropdown-text" id="version-dropdown-text">1.16-1.19</span>
          <span class="dropdown-arrow">⌄</span>
        </button>
        <div class="dropdown-menu" id="version-dropdown-menu">
          <div class="dropdown-item" data-value="gq7zo9p1">Pre 1.8</div>
          <div class="dropdown-item" data-value="q5v9ev2l">1.8</div>
          <div class="dropdown-item" data-value="jq6j9571">1.9-1.12</div>
          <div class="dropdown-item" data-value="21go6e6q">1.13-1.15</div>
          <div class="dropdown-item selected" data-value="4qye4731">1.16-1.19</div>
          <div class="dropdown-item" data-value="lx5oek31">1.20+</div>
        </div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr id="table-head">
            </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" id="status-container">
            <div class="spinner"></div><br>
            <span id="loading-text">Fetching data from speedrun.com...</span>
          </td></tr>
        </tbody>
      </table>
    </div>

    <div id="pagination" class="pagination-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
